<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Budget Management System : Executive Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        primary: '#881337', // KTU Burgundy
                        secondary: '#D97706', 
                        slate: '#1E293B', 
                        light: '#F8FAFC'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #F1F5F9; color: #1E293B; font-size: 16px; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card { background-color: #ffffff; border-radius: 1.5rem; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); border: 1px solid #F1F5F9; }
        .card-exec { background: linear-gradient(135deg, #ffffff 0%, #F8FAFC 100%); border: 1px solid #E2E8F0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 9999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .spinner { border: 4px solid #F1F5F9; border-top: 4px solid #881337; border-radius: 50%; width: 56px; height: 56px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast-container { position: fixed; top: 90px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast { padding: 16px 24px; border-radius: 16px; color: white; font-weight: 600; font-size: 16px; opacity: 0; transform: translateY(-20px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display:flex; align-items:center; gap:10px;}
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #065F46; } 
        .toast.error { background-color: #9F1239; } 
        .choices__inner { border-radius: 0.75rem; border-color: #CBD5E1; background-color: #fff; font-size: 16px; padding: 0.5rem 0.75rem; min-height: 48px; display:flex; align-items:center;}
        .choices[data-type*="select-one"] .choices__input { font-family: 'Sarabun', sans-serif; font-size: 16px; }
        table th { font-size: 16px; font-weight: 700; color: #334155; }
        table td { font-size: 16px; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div id="loader" class="loader-overlay"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <header class="glass-header w-full flex justify-between items-center px-4 md:px-6 py-3 md:py-4 z-40 shrink-0 gap-2 shadow-sm">
        <div class="flex items-center gap-2 md:gap-4">
            <button id="mobile-menu-btn" onclick="toggleSidebar()" class="hidden flex text-slate-600 p-2 -ml-2 rounded-full hover:bg-slate-100 transition"><i data-lucide="menu" class="w-6 h-6"></i></button>
            
            <div class="flex items-center gap-2 md:gap-4 cursor-pointer" onclick="switchView('public_home')">
                <img src="https://github.com/user-attachments/assets/b6087682-06a1-4406-8471-67149a205c2d" class="h-10 md:h-12 object-contain" alt="Logo">
                <div>
                    <h1 class="text-lg md:text-2xl font-extrabold text-primary tracking-tight leading-tight">ระบบบริหารงบประมาณ ปี 2569</h1>
                    <p class="text-[11px] md:text-sm font-semibold text-slate-500">โรงเรียนอนุบาลแห่งมหาวิทยาลัยธรรมศาสตร์</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button id="btn-show-login" onclick="showLogin()" class="hidden md:flex bg-white hover:bg-rose-50 text-primary border border-rose-200 hover:border-rose-300 px-6 py-2.5 rounded-full font-bold shadow-sm hover:shadow transition items-center gap-2.5 group">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span>เข้าสู่ระบบเจ้าหน้าที่</span>
                <i data-lucide="shield-check" class="w-4 h-4 text-rose-800 group-hover:scale-110 transition"></i>
            </button>
            
            <div id="user-profile" class="hidden items-center gap-3 bg-white px-3 md:px-4 py-2 rounded-2xl border border-slate-200 shadow-sm">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="font-bold text-slate-800 text-sm md:text-base leading-tight">Name</p>
                    <p id="user-role" class="text-[10px] md:text-xs font-semibold text-primary mt-0.5">Role</p>
                </div>
                <button onclick="confirmLogout()" class="bg-rose-50 hover:bg-rose-100 text-rose-800 p-2 rounded-xl transition" title="ออกจากระบบ"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <div id="mobile-login-bar" class="fixed bottom-0 left-0 w-full p-4 bg-white/95 backdrop-blur-md border-t border-slate-200 z-40 md:hidden flex justify-center pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="showLogin()" class="w-full bg-primary hover:bg-rose-900 text-white px-6 py-3.5 rounded-2xl font-bold shadow-lg flex justify-center items-center gap-2 transition text-lg">
            <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></div>
            <span>เข้าสู่ระบบเจ้าหน้าที่</span>
        </button>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-slate-900/70 z-50 hidden flex items-center justify-center backdrop-blur-md px-4 transition-opacity">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-800">ลงชื่อเข้าใช้</h2>
                    <p class="text-sm text-slate-400 font-medium mt-1">เฉพาะฝ่ายการเงินและบัญชี</p>
                </div>
                <button onclick="hideLogin()" class="text-slate-400 hover:text-rose-600 bg-slate-100 hover:bg-rose-50 rounded-full p-2.5 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                <div><label class="block text-sm font-bold text-slate-700 mb-2
