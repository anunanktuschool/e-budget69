<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Budget Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body class="bg-gray-100">
    <div id="app" class="p-8">
        <div class="flex gap-4 mb-4">
            <input type="text" id="filter-adv-text" placeholder="ค้นหา..." class="border p-2 rounded" onkeyup="renderAdvances()">
            <select id="filter-adv-status" onchange="renderAdvances()" class="border p-2 rounded">
                <option value="all">ทั้งหมด</option>
                <option value="pending">รอเคลียร์</option>
                <option value="cleared">เคลียร์หมด</option>
            </select>
            <button onclick="exportData()" class="bg-blue-600 text-white px-4 py-2 rounded">Export Excel</button>
            <button onclick="openForm('advance_create')" class="bg-green-600 text-white px-4 py-2 rounded">+ สร้างสัญญา</button>
        </div>

        <table class="w-full bg-white shadow rounded">
            <thead>
                <tr class="bg-gray-200">
                    <th class="p-4">วันที่</th><th class="p-4">เลขที่สัญญา</th><th class="p-4">ผู้ยืม</th><th class="p-4">กิจกรรม</th>
                    <th class="p-4">ยอดยืม</th><th class="p-4">ยอดเคลียร์</th><th class="p-4">สถานะ</th><th class="p-4">จัดการ</th>
                </tr>
            </thead>
            <tbody id="tbl-advance"></tbody>
        </table>
    </div>

    <div id="form-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded w-1/2">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Form</h2>
            <div id="form-fields"></div>
            <button onclick="handleFormSubmit(event)" class="bg-blue-600 text-white p-2 mt-4">บันทึก</button>
            <button onclick="closeForm()" class="p-2">ปิด</button>
        </div>
    </div>

    <script>
        // ใส่ Script ของคุณที่นี่ (ตรวจสอบว่าตัวแปร currentData และ function loadPrivateData ทำงานได้)
        // ... (โค้ด renderAdvances และ exportData ที่ผมให้ในคำตอบก่อนหน้า ใส่ตรงนี้)
        
        function formatMoney(n) { return Number(n).toLocaleString('th-TH', {minimumFractionDigits: 2}); }
        function formatThaiDate(iso) { return new Date(iso).toLocaleDateString('th-TH'); }
        
        // ฟังก์ชันสำคัญที่ต้องมีเพื่อให้ข้อมูลโชว์:
        function renderAdvances() {
            const tbl = document.getElementById('tbl-advance');
            if (!tbl) return;
            tbl.innerHTML = '';
            
            const fText = document.getElementById('filter-adv-text')?.value.toLowerCase() || '';
            const fStatus = document.getElementById('filter-adv-status')?.value || 'all';

            let data = currentData.advances.filter(a => {
                const p = currentData.personnel.find(x => x.id === a.user_id);
                const name = p ? p.name.toLowerCase() : "";
                const matchText = name.includes(fText) || a.contract_no.toLowerCase().includes(fText);
                const bal = Number(a.total_amount) - Number(a.cleared_amount);
                const statusMatch = (fStatus === 'all') || (fStatus === 'cleared' && bal <= 0) || (fStatus === 'pending' && bal > 0);
                return matchText && statusMatch;
            });

            data.forEach(a => {
                const p = currentData.personnel.find(x => x.id === a.user_id);
                tbl.innerHTML += `<tr>
                    <td class="p-4">${formatThaiDate(a.created_at)}</td>
                    <td class="p-4">${a.contract_no}</td>
                    <td class="p-4">${p ? p.name : 'ไม่พบชื่อ'}</td>
                    <td class="p-4">${a.activity_name}</td>
                    <td class="p-4">${formatMoney(a.total_amount)}</td>
                    <td class="p-4">${formatMoney(a.cleared_amount)}</td>
                    <td class="p-4">${(Number(a.total_amount) - Number(a.cleared_amount)) <= 0 ? 'เคลียร์หมด' : 'รอเคลียร์'}</td>
                    <td class="p-4"><button onclick="openForm('advance_create', {id:'${a.id}'})" class="bg-yellow-500 p-1">แก้ไข</button></td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
